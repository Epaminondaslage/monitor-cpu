
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Sentinela Dasboard Server:10.0.0.139 </title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

</head>


<body>

<h1>Sentinela Dasboard Server:10.0.0.139</h1>

<div id="alert"></div>


<div class="grid">


<!-- CPU -->

<div class="card gauge-container">

<h3>CPU Total</h3>

<canvas id="cpuGauge"></canvas>

<div id="cpuText" class="indicator"></div>

</div>


<!-- TEMP -->

<div class="card gauge-container">

<h3>Temperatura SoC</h3>

<canvas id="tempGauge"></canvas>

<div id="tempText" class="indicator"></div>

</div>


<!-- LOAD -->

<div class="card">

<h3>Load Average</h3>

<canvas id="loadChart"></canvas>

</div>


<!-- FRIGATE -->

<div class="card">

<h3>Frigate CPU (%)</h3>

<canvas id="frigateChart"></canvas>

</div>


<!-- DISK IO -->

<div class="card">

<h3>Disk IO</h3>

<canvas id="diskChart"></canvas>

</div>


<!-- CPU CORE -->

<div class="card">

<h3>CPU por Core</h3>

<canvas id="coreChart"></canvas>

</div>


<!-- RAM + DISCO -->

<div class="card">

<h3>Memória e Disco</h3>

<div class="bar-title">RAM</div>

<div class="ram-bar">
<div id="ramFill"></div>
</div>

<div id="ramText" class="indicator"></div>


<div class="bar-title">Disco</div>

<div class="ram-bar">
<div id="diskFill"></div>
</div>

<div id="diskText" class="indicator"></div>

</div>


<!-- CONTAINERS -->

<div class="card">

<h3>Containers</h3>

<div id="containers"></div>

</div>


</div>



<script>


const cpuGauge = new Gauge(
document.getElementById("cpuGauge")
).setOptions({

angle:0,
lineWidth:0.25,
radiusScale:0.9,

pointer:{
length:0.6,
strokeWidth:0.04,
color:"#000"
},

staticZones:[
{strokeStyle:"#22c55e",min:0,max:50},
{strokeStyle:"#facc15",min:50,max:80},
{strokeStyle:"#ef4444",min:80,max:100}
]

});

cpuGauge.maxValue=100;
cpuGauge.setMinValue(0);



const tempGauge = new Gauge(
document.getElementById("tempGauge")
).setOptions({

angle:0,
lineWidth:0.25,
radiusScale:0.9,

pointer:{
length:0.6,
strokeWidth:0.04,
color:"#000"
},

staticZones:[
{strokeStyle:"#22c55e",min:0,max:60},
{strokeStyle:"#facc15",min:60,max:75},
{strokeStyle:"#ef4444",min:75,max:100}
]

});

tempGauge.maxValue=100;
tempGauge.setMinValue(0);



function createLineChart(ctx,label,color,maxY=100){

return new Chart(ctx,{
type:'line',

data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:color,
backgroundColor:color,
fill:false,
tension:0.2
}]
},

options:{
animation:false,
responsive:true,
scales:{y:{min:0,max:maxY}}
}

});

}



const loadChart=createLineChart(
document.getElementById('loadChart'),
'Load','#ef4444',8
);


const frigateChart=createLineChart(
document.getElementById('frigateChart'),
'Frigate','#22c55e',200
);



const diskChart=new Chart(

document.getElementById('diskChart'),

{
type:'line',

data:{
labels:[],
datasets:[
{label:'Read',data:[],borderColor:'#facc15'},
{label:'Write',data:[],borderColor:'#ef4444'}
]
},

options:{animation:false}

}

);



const coreChart=new Chart(

document.getElementById('coreChart'),

{
type:'bar',

data:{
labels:[],
datasets:[{
data:[],
backgroundColor:'#6366f1'
}]
},

options:{
animation:false,
scales:{y:{min:0,max:100}}
}

}

);



function addData(chart,value){

const now=new Date().toLocaleTimeString();

chart.data.labels.push(now);
chart.data.datasets[0].data.push(value);

if(chart.data.labels.length>30){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();

}

chart.update();

}



function update(){

fetch('/monitor-cpu/api.php')

.then(r=>r.json())

.then(data=>{


cpuGauge.set(data.cpu);
tempGauge.set(data.temp);

document.getElementById("cpuText").innerText=data.cpu+" %";
document.getElementById("tempText").innerText=data.temp+" °C";


addData(loadChart,data.load);
addData(frigateChart,data.frigate_cpu);



const now=new Date().toLocaleTimeString();

diskChart.data.labels.push(now);
diskChart.data.datasets[0].data.push(data.disk_read);
diskChart.data.datasets[1].data.push(data.disk_write);

if(diskChart.data.labels.length>30){

diskChart.data.labels.shift();
diskChart.data.datasets[0].data.shift();
diskChart.data.datasets[1].data.shift();

}

diskChart.update();



if(data.cores){

coreChart.data.labels=Object.keys(data.cores);
coreChart.data.datasets[0].data=Object.values(data.cores);
coreChart.update();

}



let ramPercent=(data.ram_used/data.ram_total)*100;

document.getElementById("ramFill").style.width=ramPercent+"%";

document.getElementById("ramText").innerText=
data.ram_used+" MB / "+data.ram_total+" MB";



let diskPercent=(data.disk_used/data.disk_total)*100;

document.getElementById("diskFill").style.width=diskPercent+"%";

document.getElementById("diskText").innerText=
data.disk_used+" GB / "+data.disk_total+" GB";



if(data.containers){

let html="";

data.containers.forEach(c=>{

let color="status-ok";

if(c.state==="exited") color="status-danger";
if(c.state==="restarting") color="status-warning";

html+=`
<div class="container-row">
<span class="${color}">●</span>
${c.name}
<span class="container-state">${c.state}</span>
</div>
`;

});

document.getElementById("containers").innerHTML=html;

}



});

}



setInterval(update,3000);

update();


</script>


</body>
</html>
